<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 460px;
            padding: 48px 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            display: inline-block;
            color: white;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #1e293b;
            box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            border-left: 4px solid #16a34a;
        }

        .demo-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }

        .demo-section p {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 12px;
            font-weight: 500;
            text-align: center;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 11px;
        }

        .demo-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #e2e8f0;
        }

        .demo-card strong {
            color: #1e293b;
            display: block;
            margin-bottom: 4px;
        }

        .demo-card small {
            color: #64748b;
        }

        .role-tag {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 9px;
            margin-top: 6px;
            color: #334155;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="header">
        <div class="logo-icon">SP</div>
        <h1>Secure Portal</h1>
        <p class="subtitle">Authentication required to access the application</p>
    </div>

    <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/authenticate}" method="post">
        <div class="form-group">
            <label for="username">Username / Identifiant</label>
            <input type="text" id="username" name="username" required autofocus placeholder="e.g., hafsa.ajabboune">
        </div>

        <div class="form-group">
            <label for="password">Password / Mot de passe</label>
            <input type="password" id="password" name="password" required placeholder="********">
        </div>

        <button type="submit" class="btn-login">Sign in / Se connecter</button>
    </form>

    <div class="demo-section">
        <p>Demo Accounts / Comptes de demonstration</p>
        <div class="demo-grid">
            <div class="demo-card">
                <strong>hafsa.ajabboune</strong>
                <small>Xk9#mP2$wL5@</small>
                <div class="role-tag">Administrator</div>
            </div>
            <div class="demo-card">
                <strong>fatimaazahra.aithassou</strong>
                <small>Yt7&bN4#rM1@</small>
                <div class="role-tag">Manager</div>
            </div>
            <div class="demo-card">
                <strong>sara.elaatifi</strong>
                <small>Zw3*cV8$pL6!</small>
                <div class="role-tag">Consultant</div>
            </div>
            <div class="demo-card">
                <strong>loubna.elghazi</strong>
                <small>Ue5@jR2#kW7$</small>
                <div class="role-tag">Guest</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
