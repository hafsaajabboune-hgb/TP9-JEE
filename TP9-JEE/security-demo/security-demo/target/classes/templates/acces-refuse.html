<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Accès Refusé - Portail Sécurisé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .conteneur {
            background: white;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
            margin: 20px;
        }

        .code-erreur {
            font-size: 72px;
            color: #dc2626;
            margin-bottom: 16px;
        }

        .titre-erreur {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .message-erreur {
            color: #64748b;
            margin-bottom: 32px;
        }

        .bouton-retour {
            display: inline-block;
            background: #2d6a4f;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
        }

        .bouton-retour:hover {
            background: #1a472a;
        }
    </style>
</head>
<body>
<div class="conteneur">
    <div class="code-erreur">403</div>
    <h1 class="titre-erreur">Accès non autorisé</h1>
    <p class="message-erreur">Vous ne disposez pas des droits nécessaires pour accéder à cette ressource.</p>
    <a href="/accueil" class="bouton-retour">Retour à l'accueil</a>
</div>
</body>
</html>
